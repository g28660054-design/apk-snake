plugins { id 'com.android.application' }
android {
  compileSdkVersion 33
  buildToolsVersion "33.0.2"
  defaultConfig {
    applicationId "com.builder.apk"
    minSdkVersion 23
    targetSdkVersion 33
    versionCode 1
    versionName "1.0.0"
  }
  signingConfigs {
    release {
      storeFile file('release.jks')
      storePassword 'apkbuilder123'
      keyAlias 'apkbuilder'
      keyPassword 'apkbuilder123'
    }
  }
  buildTypes {
    debug { debuggable true }
    release {
      signingConfig signingConfigs.release
      minifyEnabled false
    }
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}
dependencies {}\n